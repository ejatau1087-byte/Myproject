<style>
/* ==========================================================================
   Design tokens
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* Color: deep survey-navy ground, teal for security signal, amber for terrain/GIS accent */
  --ink:        #0F1B24;
  --panel:      #16232D;
  --panel-2:    #1B2C36;
  --line:       #26404B;
  --teal:       #3EC7B3;
  --amber:      #E8A33D;
  --paper:      #EDEFEF;
  --muted:      #8B9AA3;

  --display: 'Space Grotesk', sans-serif;
  --body:    'Source Serif 4', Georgia, serif;
  --mono:    'JetBrains Mono', monospace;

  --max: 1120px;
  --radius: 6px;
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--body);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

img { max-width: 100%; display: block; }

a { color: inherit; text-decoration: none; }

h1, h2, h3, h4 {
  font-family: var(--display);
  font-weight: 600;
  line-height: 1.15;
  margin: 0 0 0.5em;
  letter-spacing: -0.01em;
}

p { margin: 0 0 1em; color: var(--paper); }

.wrap {
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 28px;
}

/* Grid-reference labels: the site's recurring signature device */
.gridref {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--teal);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.gridref::before {
  content: "";
  width: 18px;
  height: 1px;
  background: var(--teal);
}

/* ==========================================================================
   Header / nav
   ========================================================================== */
header.site {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(15, 27, 36, 0.88);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0;
}

.brand {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.02em;
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.brand span.tag {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--amber);
  font-weight: 400;
  letter-spacing: 0.1em;
}

.nav-links {
  display: flex;
  gap: 8px;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-links a {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.04em;
  color: var(--muted);
  padding: 8px 14px;
  border-radius: var(--radius);
  transition: color 0.2s ease, background 0.2s ease;
  position: relative;
}
.nav-links a:hover,
.nav-links a:focus-visible {
  color: var(--paper);
  background: var(--panel-2);
}
.nav-links a.active { color: var(--teal); }
.nav-links a.active::after {
  content: "";
  position: absolute;
  left: 14px; right: 14px; bottom: 3px;
  height: 2px;
  background: var(--teal);
}

.nav-toggle {
  display: none;
  background: none;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--paper);
  width: 40px; height: 36px;
  font-size: 18px;
  cursor: pointer;
}

@media (max-width: 760px) {
  .nav-toggle { display: block; }
  .nav-links {
    position: absolute;
    top: 100%; left: 0; right: 0;
    flex-direction: column;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 10px;
    display: none;
  }
  .nav-links.open { display: flex; }
  .nav-links a { padding: 12px 14px; }
}

/* ==========================================================================
   Hero
   ========================================================================== */
.hero {
  position: relative;
  padding: 90px 0 100px;
  overflow: hidden;
  border-bottom: 1px solid var(--line);
}

.contour-field {
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: 0.5;
  pointer-events: none;
}

.hero .wrap { position: relative; z-index: 1; }

.hero-grid {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 56px;
  align-items: center;
}

@media (max-width: 820px) {
  .hero-grid { grid-template-columns: 1fr; }
}

.eyebrow { margin-bottom: 18px; }

.hero h1 {
  font-size: clamp(2.1rem, 4.4vw, 3.4rem);
  max-width: 14ch;
}
.hero h1 em {
  font-style: normal;
  color: var(--teal);
}

.lede {
  font-size: 1.08rem;
  color: var(--muted);
  max-width: 46ch;
}

.btn-row { display: flex; gap: 14px; margin-top: 28px; flex-wrap: wrap; }

.btn {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.04em;
  padding: 12px 20px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  display: inline-block;
}
.btn:hover { transform: translateY(-2px); }
.btn.primary {
  background: var(--teal);
  color: var(--ink);
  border-color: var(--teal);
  font-weight: 500;
}
.btn.primary:hover { background: #57d6c4; }
.btn.ghost { color: var(--paper); }
.btn.ghost:hover { border-color: var(--teal); color: var(--teal); }

.hero-portrait {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--panel);
  aspect-ratio: 4 / 5;
}
.hero-portrait img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* coordinate ticker */
.ticker {
  border-top: 1px solid var(--line);
  background: var(--panel);
  overflow: hidden;
  white-space: nowrap;
}
.ticker-track {
  display: inline-block;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
  padding: 10px 0;
  animation: scroll-left 26s linear infinite;
}
.ticker-track span { margin-right: 46px; }
@keyframes scroll-left {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
@media (prefers-reduced-motion: reduce) {
  .ticker-track { animation: none; }
  html { scroll-behavior: auto; }
}

/* ==========================================================================
   Sections
   ========================================================================== */
section { padding: 78px 0; border-bottom: 1px solid var(--line); }
section:last-of-type { border-bottom: none; }

.section-head { margin-bottom: 42px; max-width: 60ch; }
.section-head h2 { font-size: clamp(1.5rem, 2.6vw, 2.1rem); }

.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.reveal.in { opacity: 1; transform: translateY(0); }

/* cards */
.card-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
@media (max-width: 900px) { .card-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 620px) { .card-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px;
  transition: border-color 0.2s ease, transform 0.2s ease;
}
.card:hover { border-color: var(--teal); transform: translateY(-3px); }
.card h3 { font-size: 1.05rem; margin-bottom: 8px; }
.card p { color: var(--muted); font-size: 0.95rem; }

/* skills table */
table.skills {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
}
table.skills th, table.skills td {
  text-align: left;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
table.skills th {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--teal);
  text-transform: uppercase;
}
.bar-bg {
  background: var(--panel-2);
  border-radius: 4px;
  height: 8px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--amber));
  border-radius: 4px;
}

/* project cards */
.project-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s ease, transform 0.2s ease;
}
.project-card:hover { border-color: var(--amber); transform: translateY(-3px); }
.project-card img { border-bottom: 1px solid var(--line); }
.project-body { padding: 20px; }
.project-body h3 { font-size: 1.05rem; }
.project-tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 14px; }
.tag {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 9px;
  border: 1px solid var(--line);
  border-radius: 20px;
  color: var(--muted);
}
.project-link {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--teal);
}
.project-link:hover { text-decoration: underline; }

/* footer */
footer.site {
  border-top: 1px solid var(--line);
  padding: 36px 0;
}
.foot-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
}
.foot-row a { color: var(--muted); }
.foot-row a:hover { color: var(--teal); }

/* ==========================================================================
   About page specifics
   ========================================================================== */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}
@media (max-width: 760px) { .about-grid { grid-template-columns: 1fr; } }

.timeline { border-left: 1px solid var(--line); padding-left: 22px; }
.timeline .item { margin-bottom: 26px; position: relative; }
.timeline .item::before {
  content: "";
  position: absolute; left: -27px; top: 4px;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 0 3px var(--ink);
}
.timeline time {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--teal);
  display: block;
  margin-bottom: 4px;
}

.hobby-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
.hobby-list li {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
}

/* ==========================================================================
   Planner page
   ========================================================================== */
.planner-shell {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 26px;
}
.planner-form { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
.planner-form input[type="text"],
.planner-form input[type="date"] {
  background: var(--ink);
  border: 1px solid var(--line);
  color: var(--paper);
  padding: 12px 14px;
  border-radius: var(--radius);
  font-family: var(--body);
  font-size: 0.95rem;
}
.planner-form input[type="text"] { flex: 1; min-width: 200px; }
.planner-form input:focus, textarea:focus, button:focus-visible {
  outline: 2px solid var(--teal);
  outline-offset: 2px;
}

.planner-stats {
  display: flex;
  gap: 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.planner-stats strong { color: var(--paper); }

.filter-row { display: flex; gap: 8px; margin-bottom: 18px; }
.filter-btn {
  font-family: var(--mono);
  font-size: 12px;
  padding: 7px 13px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
}
.filter-btn.active { color: var(--ink); background: var(--teal); border-color: var(--teal); }

ul.task-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--ink);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.task-item.done { opacity: 0.55; }
.task-item.done .task-text { text-decoration: line-through; }
.task-text { flex: 1; }
.task-due { font-family: var(--mono); font-size: 11px; color: var(--amber); }
.task-check {
  width: 20px; height: 20px;
  border-radius: 5px;
  border: 1px solid var(--line);
  background: none;
  cursor: pointer;
  display: grid; place-items: center;
  color: var(--teal);
  font-size: 13px;
}
.task-del {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
}
.task-del:hover { color: #e0645c; }
.empty-state {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--muted);
  padding: 30px 0;
  text-align: center;
}

/* ==========================================================================
   Contact page
   ========================================================================== */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
}
@media (max-width: 800px) { .contact-grid { grid-template-columns: 1fr; } }

.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 7px;
  text-transform: uppercase;
}
.field input, .field textarea {
  width: 100%;
  background: var(--panel);
  border: 1px solid var(--line);
  color: var(--paper);
  padding: 12px 14px;
  border-radius: var(--radius);
  font-family: var(--body);
  font-size: 0.98rem;
  transition: border-color 0.15s ease;
}
.field textarea { min-height: 130px; resize: vertical; }
.field input.error, .field textarea.error { border-color: #e0645c; }
.error-msg {
  font-family: var(--mono);
  font-size: 11.5px;
  color: #e0645c;
  min-height: 16px;
  margin-top: 5px;
  display: block;
}
.form-status {
  font-family: var(--mono);
  font-size: 13px;
  padding: 12px 14px;
  border-radius: var(--radius);
  margin-bottom: 18px;
  display: none;
}
.form-status.show { display: block; }
.form-status.ok { background: rgba(62,199,179,0.12); border: 1px solid var(--teal); color: var(--teal); }

.contact-info .item { margin-bottom: 20px; }
.contact-info .label { font-family: var(--mono); font-size: 11px; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; display:block; margin-bottom: 4px;}

address { font-style: normal; }

</style>

<script>
// Shared behaviour across every page: nav, reveal-on-scroll, ticker content.
document.addEventListener('DOMContentLoaded', function () {

  // --- Mobile nav toggle -----------------------------------------------
  var toggle = document.querySelector('.nav-toggle');
  var links = document.querySelector('.nav-links');
  if (toggle && links) {
    toggle.addEventListener('click', function () {
      links.classList.toggle('open');
      var isOpen = links.classList.contains('open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
  }

  // --- Highlight the current page in the nav ----------------------------
  var current = window.location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-links a').forEach(function (a) {
    var href = a.getAttribute('href');
    if (href === current || (current === '' && href === 'index.html')) {
      a.classList.add('active');
    }
  });

  // --- Reveal-on-scroll ---------------------------------------------------
  var revealEls = document.querySelectorAll('.reveal');
  if ('IntersectionObserver' in window && revealEls.length) {
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('in');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    revealEls.forEach(function (el) { observer.observe(el); });
  } else {
    revealEls.forEach(function (el) { el.classList.add('in'); });
  }
});

</script>
<script>
// Academic Planner — interactive task management system
// Demonstrates: arrays, functions, DOM manipulation, event handling, dynamic updates.

(function () {
  var STORAGE_KEY = 'academicPlannerTasks';
  var tasks = [];               // array of { id, text, due, done }
  var activeFilter = 'all';

  var form = document.getElementById('taskForm');
  var input = document.getElementById('taskInput');
  var dueInput = document.getElementById('taskDue');
  var list = document.getElementById('taskList');
  var emptyState = document.getElementById('emptyState');
  var countTotal = document.getElementById('countTotal');
  var countDone = document.getElementById('countDone');
  var countOpen = document.getElementById('countOpen');
  var filterButtons = document.querySelectorAll('.filter-btn');

  if (!form) return; // planner.js loaded on a page without the planner markup

  function loadTasks() {
    try {
      var raw = window.localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : seedTasks();
    } catch (err) {
      tasks = seedTasks();
    }
  }

  function seedTasks() {
    return [
      { id: cryptoId(), text: 'Submit COS 106 term project repo link', due: '', done: false },
      { id: cryptoId(), text: 'Review threat intelligence lecture notes', due: '', done: false }
    ];
  }

  function saveTasks() {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch (err) {
      /* storage unavailable — task list still works for this session */
    }
  }

  function cryptoId() {
    return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function addTask(text, due) {
    text = text.trim();
    if (!text) return;
    tasks.push({ id: cryptoId(), text: text, due: due || '', done: false });
    saveTasks();
    render();
  }

  function toggleTask(id) {
    tasks = tasks.map(function (t) {
      if (t.id === id) t.done = !t.done;
      return t;
    });
    saveTasks();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(function (t) { return t.id !== id; });
    saveTasks();
    render();
  }

  function filteredTasks() {
    if (activeFilter === 'active') return tasks.filter(function (t) { return !t.done; });
    if (activeFilter === 'completed') return tasks.filter(function (t) { return t.done; });
    return tasks;
  }

  function formatDue(due) {
    if (!due) return '';
    var d = new Date(due + 'T00:00:00');
    if (isNaN(d)) return '';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function render() {
    list.innerHTML = '';
    var visible = filteredTasks();

    if (visible.length === 0) {
      emptyState.style.display = 'block';
    } else {
      emptyState.style.display = 'none';
      visible.forEach(function (t) {
        var li = document.createElement('li');
        li.className = 'task-item' + (t.done ? ' done' : '');

        var check = document.createElement('button');
        check.className = 'task-check';
        check.type = 'button';
        check.setAttribute('aria-label', t.done ? 'Mark as not done' : 'Mark as done');
        check.textContent = t.done ? '✓' : '';
        check.addEventListener('click', function () { toggleTask(t.id); });

        var span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = t.text;

        li.appendChild(check);
        li.appendChild(span);

        if (t.due) {
          var due = document.createElement('span');
          due.className = 'task-due';
          due.textContent = formatDue(t.due);
          li.appendChild(due);
        }

        var del = document.createElement('button');
        del.className = 'task-del';
        del.type = 'button';
        del.textContent = 'Remove';
        del.addEventListener('click', function () { deleteTask(t.id); });

        li.appendChild(del);
        list.appendChild(li);
      });
    }

    var doneCount = tasks.filter(function (t) { return t.done; }).length;
    countTotal.textContent = tasks.length;
    countDone.textContent = doneCount;
    countOpen.textContent = tasks.length - doneCount;
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    addTask(input.value, dueInput.value);
    input.value = '';
    dueInput.value = '';
    input.focus();
  });

  filterButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      filterButtons.forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  loadTasks();
  render();
})();

</script>
</body>
</html>
