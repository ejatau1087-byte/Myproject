<header class="site">
  <nav class="nav wrap">
    <a class="brand" href="index.html">EN JATAU <span class="tag">// SEC</span></a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>

    </ul>
  </nav>

<section class="hero" style="padding:60px 0 50px;">
  <img class="contour-field" src="assets/topo-bg.svg" alt="" aria-hidden="true">
  <div class="wrap reveal in">
    <p class="gridref">ACADEMIC PLANNER</p>
    <h1 style="max-width:22ch;">Keep the coursework on the map</h1>
  </div>
</section>

<section>
  <div class="wrap">
    <div class="planner-shell reveal">

      <form class="planner-form" id="taskForm">
        <input type="text" id="taskInput" placeholder="Add a task — e.g. Read Module 4" required aria-label="Task description">
        <input type="date" id="taskDue" aria-label="Due date (optional)">
        <button type="submit" class="btn primary">Add Task</button>
      </form>

      <div class="planner-stats">
        <span>Total: <strong id="countTotal">0</strong></span>
        <span>Completed: <strong id="countDone">0</strong></span>
        <span>Open: <strong id="countOpen">0</strong></span>
      </div>

      <div class="filter-row">
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="active" type="button">Active</button>
        <button class="filter-btn" data-filter="completed" type="button">Completed</button>
      </div>

      <ul class="task-list" id="taskList"></ul>
      <p class="empty-state" id="emptyState">No tasks here yet — add one above.</p>
    </div>
  </div>
</section>
