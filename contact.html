<section class="hero" style="padding:60px 0 50px;">
  <img class="contour-field" src="assets/topo-bg.svg" alt="" aria-hidden="true">
  <div class="wrap reveal in">
    <p class="gridref">CONTACT</p>
    <h1 style="max-width:22ch;">Let's connect</h1>
  </div>
</section>

<section>
  <div class="wrap contact-grid">

    <div class="reveal">
      <div id="formStatus" class="form-status" role="status"></div>
      <form id="contactForm" novalidate>
        <div class="field">
          <label for="cName">Name</label>
          <input type="text" id="cName" name="name" autocomplete="name">
          <span class="error-msg" id="errName"></span>
        </div>
        <div class="field">
          <label for="cEmail">Email Address</label>
          <input type="text" id="cEmail" name="email" autocomplete="email">
          <span class="error-msg" id="errEmail"></span>
        </div>
        <div class="field">
          <label for="cPhone">Phone Number</label>
          <input type="text" id="cPhone" name="phone" autocomplete="tel" placeholder="Digits only">
          <span class="error-msg" id="errPhone"></span>
        </div>
        <div class="field">
          <label for="cMessage">Message</label>
          <textarea id="cMessage" name="message"></textarea>
          <span class="error-msg" id="errMessage"></span>
        </div>
        <button type="submit" class="btn primary">Send Message</button>
      </form>
    </div>

    <div class="contact-info reveal">
      <p class="gridref" style="margin-bottom:20px;">DIRECT</p>
      <div class="item">
        <span class="label">Email</span>
        <a href="mailto:e.jatau1087@miva.edu.ng">e.jatau1087@miva.edu.ng</a>
      </div>
      <div class="item">
        <span class="label">Phone</span>
        <address>+234 705 873 0133</address>
      </div>
      <div class="item">
        <span class="label">Location</span>
        <address>Jos, Plateau State, Nigeria</address>
      </div>
      <div class="item">
        <span class="label">GitHub</span>
        <a href="https://github.com/ejatau1087-byte" target="_blank" rel="noopener">github.com/ejatau1087-byte</a>
      </div>
    </div>

  </div>
</section>
